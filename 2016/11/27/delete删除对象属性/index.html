        <p>对象属性删除<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">var person=&#123;</span><br><span class="line">	name:&quot;张三&quot;,</span><br><span class="line">	age:28</span><br><span class="line">&#125;</span><br><span class="line">console.log(person.name);//张三</span><br><span class="line">delete person.name;</span><br><span class="line">console.log(person.name);//undefined</span><br></pre></td></tr></table></figure></p>
<p>注意：直接用delete删除不了变量<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">var name=&quot;李四&quot;</span><br><span class="line">delete name;</span><br><span class="line">console.log(name);//李四</span><br></pre></td></tr></table></figure></p>
<p>删除不了原型链中的变量<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">function fun() &#123;</span><br><span class="line">	this.name = &apos;mm&apos;;</span><br><span class="line">&#125;</span><br><span class="line">var obj = new fun();</span><br><span class="line">fun.prototype.age = 18;</span><br><span class="line">delete obj.age;</span><br><span class="line">console.log(obj.age) //18</span><br></pre></td></tr></table></figure></p>
